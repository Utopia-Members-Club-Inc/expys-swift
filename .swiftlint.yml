# SwiftLint configuration for ExpysSDK. CI runs `swiftlint --strict`, so every
# violation (warning included) fails the build. Kept consistent in spirit with
# the TypeScript (ESLint) and Kotlin (ktlint) linters: small files, no dead code,
# no force-unwrap surprises, functional style.
included:
  - Sources
  - Tests
  - Examples
excluded:
  - .build
  # Generated from the OpenAPI spec; never hand-edited, so never linted.
  - Sources/ExpysSDK/Generated

disabled_rules:
  # The `todo` rule would flag the intentional `TODO(lead):` provisioning markers.
  - todo
  # The SDK uses trailing commas in multi-line literals (matching the TS prettier
  # `trailingComma: all` convention), which this rule would otherwise forbid.
  - trailing_comma

opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - first_where
  - last_where
  - literal_expression_end_indentation
  - modifier_order
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_zero_over_explicit_init
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - yoda_condition

line_length:
  warning: 100
  error: 120
  ignores_comments: true
  ignores_urls: true

# The SDK uses short, idiomatic names (`s`, `ua`, `id`, `t0`) for locals and test
# fixtures; allow them while keeping the upper-bound check.
identifier_name:
  min_length:
    warning: 1
    error: 1
  max_length:
    warning: 50
    error: 60

type_name:
  allowed_symbols: ["_"]

# Foundation-only SDK with a deliberately small surface; the defaults are generous
# but pin them explicitly so a future large file is a conscious choice.
# `ExpysClient` is the deliberately-flat, one-method-per-endpoint API client (22
# methods) mirroring the TS/Kotlin SDK surface; the Kotlin side likewise bumped its
# detekt `TooManyFunctions` limit. Raised so the flat client stays a conscious choice.
file_length:
  warning: 600
  error: 800

# See `file_length`: the flat `ExpysClient` body exceeds the 250-line default.
# Raised to keep the one-method-per-endpoint surface (mirroring TS/Kotlin) in one
# struct rather than splitting it artificially across extensions.
type_body_length:
  warning: 300
  error: 400

nesting:
  type_level:
    warning: 2

reporter: "xcode"
